name: APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Elle de tetiklenebilir

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu indir
      uses: actions/checkout@v4

    - name: Java 17 kur
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Gradle önbelleği
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*') }}

    - name: gradlew çalıştırma izni ver
      run: chmod +x gradlew

    - name: APK derle (Debug — imzasız)
      run: ./gradlew assembleDebug

    - name: APK dosyasını yükle
      uses: actions/upload-artifact@v4
      with:
        name: SIM-Giris-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

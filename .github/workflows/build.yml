name: SİM Giriş APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Kodu indir
      uses: actions/checkout@v4

    - name: Java 21 kur
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Gradle kur ve Wrapper oluştur
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -O gradle.zip
        unzip -q gradle.zip
        ./gradle-8.10.2/bin/gradle wrapper --gradle-version 8.10.2
        chmod +x gradlew

    - name: Gradle önbelleği
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*') }}

    - name: Release APK Derle
      run: ./gradlew assembleRelease --stacktrace -PbuildVersionCode=${{ github.run_number }}

    - name: APK İmzala (sabit keystore)
      run: |
        BUILD_TOOLS=$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)
        ${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/zipalign -v 4 \
          app/build/outputs/apk/release/app-release-unsigned.apk \
          aligned.apk
        ${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/apksigner sign \
          --ks simgiris-release.p12 \
          --ks-type PKCS12 \
          --ks-pass pass:simgiris2024 \
          --key-pass pass:simgiris2024 \
          --ks-key-alias simgiris \
          --out SIMGiris.apk \
          aligned.apk
        echo "İmza doğrulama:"
        ${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/apksigner verify --verbose SIMGiris.apk

    - name: Artifact yükle
      uses: actions/upload-artifact@v4
      with:
        name: SIMGiris-v${{ github.run_number }}
        path: SIMGiris.apk
        retention-days: 30

    - name: GitHub Release oluştur
      uses: ncipollo/release-action@v1
      with:
        tag: v${{ github.run_number }}
        name: "SİM Giriş v${{ github.run_number }}"
        body: |
          SİM Giriş APK — otomatik derleme #${{ github.run_number }}

          **v1.3:** Android 16 (One UI 8.0) ve tüm Android sürümleri (5.0+) ile tam uyumlu.

          **Kurulum:** APK dosyasını indir → aç → Yükle.
          POCO/Xiaomi/Samsung: Ayarlar → Güvenlik → Bilinmeyen Kaynaklardan Yükle → İzin ver
        artifacts: SIMGiris.apk
        artifactContentType: application/vnd.android.package-archive
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
